M Plex Mono',monospace;\">Elf64_Sym<\u002Fcode> <b>malloc'd inside the function<\u002Fb> (caller frees); <code style=\"font-family:'IBM Plex Mono',monospace;\">*out_count = sh_size / sizeof(Elf64_Sym)<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">symtab_shdr == NULL<\u002Fcode> (this happens for a \"stripped\" object — one built or post-processed to remove its symbol table entirely, e.g. to save space — there's nothing to parse); <code style=\"font-family:'IBM Plex Mono',monospace;\">sh_size<\u002Fcode> not a clean multiple of <code style=\"font-family:'IBM Plex Mono',monospace;\">sizeof(Elf64_Sym)<\u002Fcode> (the section's byte size should always divide evenly into whole records — if it doesn't, the file is corrupt; truncate or reject, and document which).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">symbols.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">symbols.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">malloc<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">memcpy<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">size_t nsyms;\nElf64_Sym *syms = parse_symtab(buf, symtab_shdr, &amp;nsyms);\nfree(syms);   // caller's responsibility<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 15 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">15<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">strtab<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Resolve Symbol Names<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Just like section names (#11), each symbol record stores its name only as a byte offset into a string table — this time the one named <code style=\"font-family:'IBM Plex Mono',monospace;\">.strtab<\u002Fcode>, which holds symbol names instead of section names.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">const char *symbol_name(const uint8_t *buf, const Elf64_Shdr *strtab_shdr, const Elf64_Sym *sym);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Buffer, \".strtab\" section header, one symbol entry.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Pointer <b>into <code style=\"font-family:'IBM Plex Mono',monospace;\">buf<\u002Fcode><\u002Fb> at <code style=\"font-family:'IBM Plex Mono',monospace;\">strtab_shdr-&gt;sh_offset + sym-&gt;st_name<\u002Fcode> — no copy, no allocation.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">st_name == 0<\u002Fcode> (some symbols — e.g. ones that just mark a section rather than naming a function or variable — have no name at all; return <code style=\"font-family:'IBM Plex Mono',monospace;\">\"\"<\u002Fcode> for these, not garbage); offset past end of strtab.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">symbols.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">symbols.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">strnlen<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">const char *name = symbol_name(buf, strtab, &amp;syms[3]);\nprintf(\"%s\\n\", name);      // \"main\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 16 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">16<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">funcsym<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Filter Function Symbols in .text<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">The symbol table (#14) contains every kind of symbol mixed together — functions, variables, section markers. You only want to disassemble code, so keep just the symbols that both (a) describe a function, and (b) live in the <code style=\"font-family:'IBM Plex Mono',monospace;\">.text<\u002Fcode> section (the section that holds executable machine code, as opposed to data).<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">size_t filter_function_symbols(const Elf64_Sym *syms, size_t count, int text_shndx, const char *(*namefn)(const Elf64_Sym*), Sym **out);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Full symbol array, count, section index of \".text\", a name-lookup callback (wraps #15), <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode> — the address of a caller-declared <code style=\"font-family:'IBM Plex Mono',monospace;\">Sym *<\u002Fcode> pointer, currently unset.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Returns the count kept. The function <b>mallocs the array itself<\u002Fb> and points <code style=\"font-family:'IBM Plex Mono',monospace;\">*out<\u002Fcode> at it (an array of <code style=\"font-family:'IBM Plex Mono',monospace;\">Sym<\u002Fcode>, the wrapper type above, with <code style=\"font-family:'IBM Plex Mono',monospace;\">.end<\u002Fcode> left zero for now) — caller frees <code style=\"font-family:'IBM Plex Mono',monospace;\">*out<\u002Fcode> when done. An entry is kept when its type field marks it as a function (<code style=\"font-family:'IBM Plex Mono',monospace;\">ELF64_ST_TYPE(st_info) == STT_FUNC<\u002Fcode> — <code style=\"font-family:'IBM Plex Mono',monospace;\">STT_FUNC<\u002Fcode> is the ELF constant meaning \"this symbol names a function\", as opposed to a variable or something else) and it belongs to the <code style=\"font-family:'IBM Plex Mono',monospace;\">.text<\u002Fcode> section (<code style=\"font-family:'IBM Plex Mono',monospace;\">st_shndx == text_shndx<\u002Fcode>, comparing the symbol's recorded section index against <code style=\"font-family:'IBM Plex Mono',monospace;\">.text<\u002Fcode>'s own index from #12).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Function symbol with <code style=\"font-family:'IBM Plex Mono',monospace;\">st_size == 0<\u002Fcode> (this happens when the file was compiled without debug info, e.g. no <code style=\"font-family:'IBM Plex Mono',monospace;\">-g<\u002Fcode> flag — the symbol tells you where the function starts but not how long it is, so you can't trust its recorded size, only its starting address; #17 works around this); local vs. global visibility (both kinds of function symbol count, regardless of whether the function is only usable within this file or exported for other files to call); zero function symbols found (return 0, <code style=\"font-family:'IBM Plex Mono',monospace;\">*out = NULL<\u002Fcode>, not an error — e.g. a stripped file).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">symbols.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">symbols.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">malloc<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">Sym *funcs = NULL;\nsize_t nfuncs = filter_function_symbols(syms, nsyms, text_shndx, symbol_name_cb, &amp;funcs);\n// funcs[0..nfuncs) now hold every STT_FUNC symbol defined in .text\nfree(funcs);<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 17 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">17<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">ranges<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Compute Each Function's Byte Range<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">A function symbol's recorded size (<code style=\"font-family:'IBM Plex Mono',monospace;\">st_size<\u002Fcode>) often can't be trusted (see #16) — but if you sort every function by its starting address, then each function must end exactly where the next one begins (they're laid out back-to-back in <code style=\"font-family:'IBM Plex Mono',monospace;\">.text<\u002Fcode>). That gives you a reliable byte range — [start, end) — for each function even without trustworthy size info.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">void compute_ranges(Sym *funcs, size_t count, uint64_t text_size);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">funcs<\u002Fcode> — the caller's array from #16 (mutated in place, no return value, no allocation), count, .text section's total size.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Sorts <code style=\"font-family:'IBM Plex Mono',monospace;\">funcs<\u002Fcode> by starting address (<code style=\"font-family:'IBM Plex Mono',monospace;\">st_value<\u002Fcode>) ascending, then sets each entry's <code style=\"font-family:'IBM Plex Mono',monospace;\">.end<\u002Fcode> field to the next function's starting address — so function N's byte range is [funcs[N].st_value, funcs[N+1].st_value) — or to <code style=\"font-family:'IBM Plex Mono',monospace;\">text_size<\u002Fcode> (the end of the whole <code style=\"font-family:'IBM Plex Mono',monospace;\">.text<\u002Fcode> section) for the very last function, which has no \"next one\" to bound it.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Two symbols at the identical starting address (this happens with \"aliases\" — two different names both referring to the exact same function, e.g. via a compiler attribute); nonzero <code style=\"font-family:'IBM Plex Mono',monospace;\">st_size<\u002Fcode> disagreeing with the gap you computed from neighboring addresses (decide which one to trust — the recorded size or the computed gap — and document it); only one function in the whole file (nothing to sort, and its range runs straight to <code style=\"font-family:'IBM Plex Mono',monospace;\">text_size<\u002Fcode>).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">symbols.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">symbols.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">qsort<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">compute_ranges(funcs, nfuncs, text_size);\n// funcs is now sorted; funcs[i].end is each function's exclusive end address<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 18 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0 40px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">18<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">whereami<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Map an Address to Its Enclosing Function<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Later, when the disassembler hits a CALL or JMP instruction, it'll have a raw target address (e.g. <code style=\"font-family:'IBM Plex Mono',monospace;\">0x401020<\u002Fcode>) and need to know which function that address falls inside, so it can print a readable label like \"&lt;helper&gt;\" instead of the bare number.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">const Sym *addr_to_function(const Sym *funcs, size_t count, uint64_t addr);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Sorted function array from #17, a byte address inside .text.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Pointer <b>into the caller's <code style=\"font-family:'IBM Plex Mono',monospace;\">funcs<\u002Fcode> array<\u002Fb> (no copy), or <code style=\"font-family:'IBM Plex Mono',monospace;\">NULL<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">addr<\u002Fcode> exactly at a function's start (should match that function); <code style=\"font-family:'IBM Plex Mono',monospace;\">addr<\u002Fcode> falling in a gap between two functions' ranges — for example, compilers often insert a few unused padding bytes after a function so the next one starts at a round address (this is called \"alignment padding\") — an address in that gap belongs to no function and must return <code style=\"font-family:'IBM Plex Mono',monospace;\">NULL<\u002Fcode>, not whichever function happens to be nearby; <code style=\"font-family:'IBM Plex Mono',monospace;\">addr<\u002Fcode> before the first or after the last function entirely.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">symbols.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">symbols.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">bsearch<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">const Sym *f = addr_to_function(funcs, nfuncs, 0x401020);\nif (f) printf(\"%s\\n\", f-&gt;name);   // \"helper\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ============ CHAPTER 4 ============ -->\n  <section id=\"ch4\" style=\"max-width:900px; margin:0 auto; padding:40px 48px 8px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:13px; letter-spacing:0.1em; text-transform:uppercase;\">Chapter 4 / 6<\u002Fdiv>\n    <h2 style=\"font-size:28px; margin:6px 0 4px;\">Instruction Encoding Primitives<\u002Fh2>\n    <p style=\"color:var(--muted); font-size:14px; margin:0 0 4px;\">The shared byte-level machinery every decoder in Chapter 5 is built from. An x86-64 instruction is a variable-length run of bytes: zero or more optional \"prefix\" bytes that modify how to read what follows, then an \"opcode\" (one or two bytes identifying which operation this is — mov, add, etc.), then, depending on the opcode, more bytes spelling out the operands (what to operate on — which registers, which memory location, which constant). You can't know an instruction's length up front; you decode it left to right, and each piece you read tells you how much more there is to read. This chapter builds the small reusable pieces — prefixes, REX, ModRM, SIB, and reading trailing numbers — that Chapter 5's full instruction decoders are assembled from.<\u002Fp>\n    <div style=\"background:var(--card); border:1px solid var(--border); border-radius:6px; padding:12px 16px; font-size:13px; color:var(--muted); margin:12px 0 8px; font-family:'IBM Plex Mono',monospace; white-space:pre;\">typedef struct { int W, R, X, B; } RexBits;\ntypedef struct { int mod, reg, rm; } ModRM;\ntypedef struct { int scale, index, base; } SIB;   // scale already converted to 1/2/4/8\ntypedef enum { DISP_NONE, DISP8, DISP32, DISP32_RIP_RELATIVE, DISP32_NO_BASE } DispMode;<\u002Fdiv>\n    <p style=\"color:var(--muted); font-size:13px; margin:0 0 8px;\">Every <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_*<\u002Fcode> function below takes a pointer to one of these, caller-allocated on the stack, and fills it in — no heap allocation anywhere in this chapter.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"max-width:900px; margin:0 auto; padding:0 48px;\">\n\n    <!-- EX 19 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">19<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">prefix<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Skip Legacy Prefixes<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Some instructions are preceded by one or more optional \"prefix\" bytes that change how the instruction should be interpreted — for instance <code style=\"font-family:'IBM Plex Mono',monospace;\">0x66<\u002Fcode> means \"treat the operand size as 16-bit instead of the default\". This core doesn't need to act on most legacy prefixes' meaning — it just needs to recognize that a byte is one of these prefixes and skip past it to get to the real opcode.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">int skip_prefixes(const uint8_t *ip, int *has_66);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Pointer to the start of an instruction; <code style=\"font-family:'IBM Plex Mono',monospace;\">has_66<\u002Fcode> points at a caller-allocated <code style=\"font-family:'IBM Plex Mono',monospace;\">int<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Number of prefix bytes consumed (0 if none); <code style=\"font-family:'IBM Plex Mono',monospace;\">*has_66<\u002Fcode> set true if <code style=\"font-family:'IBM Plex Mono',monospace;\">0x66<\u002Fcode> was seen.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Same prefix repeated (legal but redundant — still just skip); a prefix byte immediately followed by end of buffer (no opcode at all).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decode_common.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — byte comparisons only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0x66, 0x89, 0xC0};\nint has66;\nint n = skip_prefixes(code, &amp;has66);   // n == 1, has66 == 1<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 20 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">20<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">rex<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode the REX Prefix<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Original 1970s-era x86 could only address 8 registers, each up to 32 bits wide. When AMD extended the architecture to 64-bit, it needed a backward-compatible way to say \"actually, use the wider, newer registers\" — the answer is one optional byte, always in the range <code style=\"font-family:'IBM Plex Mono',monospace;\">0x40<\u002Fcode>-<code style=\"font-family:'IBM Plex Mono',monospace;\">0x4F<\u002Fcode>, called the \"REX prefix\". Its low 4 bits are individually meaningful flags: <code style=\"font-family:'IBM Plex Mono',monospace;\">W<\u002Fcode> (use 64-bit operands instead of 32-bit), and <code style=\"font-family:'IBM Plex Mono',monospace;\">R<\u002Fcode>/<code style=\"font-family:'IBM Plex Mono',monospace;\">X<\u002Fcode>/<code style=\"font-family:'IBM Plex Mono',monospace;\">B<\u002Fcode> (each adds one extra bit to a different register-number field elsewhere in the instruction, unlocking registers r8-r15 in addition to the original 8).<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">bool decode_rex(uint8_t byte, RexBits *out);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>A single byte; <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode> points at a caller-allocated <code style=\"font-family:'IBM Plex Mono',monospace;\">RexBits<\u002Fcode> (stack struct).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">true<\u002Fcode> + populated <code style=\"font-family:'IBM Plex Mono',monospace;\">{W,R,X,B}<\u002Fcode> bits if in <code style=\"font-family:'IBM Plex Mono',monospace;\">[0x40,0x4F]<\u002Fcode>; <code style=\"font-family:'IBM Plex Mono',monospace;\">false<\u002Fcode> otherwise.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">byte == 0x40<\u002Fcode> (a valid REX with all bits zero, distinct from \"no REX\"); byte just outside the range (<code style=\"font-family:'IBM Plex Mono',monospace;\">0x3F<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">0x50<\u002Fcode>).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decode_common.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Bitwise operators only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">RexBits rex;\nbool present = decode_rex(0x48, &amp;rex);\n// present == true, rex.W == 1, rex.R == rex.X == rex.B == 0<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 21 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">21<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">modrm<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode the ModRM Byte<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Most instructions that read or write a register or memory location have a byte right after the opcode called \"ModRM\" (short for \"mode, register, memory\"), which packs three separate small numbers into its 8 bits: which \"addressing mode\" to use (roughly: is the operand a register directly, or a memory address, and if memory, how many extra bytes describe that address?), which register is one operand, and which register-or-memory is the other. This is the single most important byte in x86 decoding — almost every decoder in Chapter 5 reads one.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">void decode_modrm(uint8_t byte, ModRM *out);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>A single byte; <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode> is a caller-allocated <code style=\"font-family:'IBM Plex Mono',monospace;\">ModRM<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Fills three fields, each pulled from a different bit range of the byte using your <code style=\"font-family:'IBM Plex Mono',monospace;\">get_bits<\u002Fcode> from #3: <code style=\"font-family:'IBM Plex Mono',monospace;\">mod<\u002Fcode> (bits 7:6 — the addressing mode, one of 4 values), <code style=\"font-family:'IBM Plex Mono',monospace;\">reg<\u002Fcode> (bits 5:3 — one operand's register number, 0-7 before REX extends it), <code style=\"font-family:'IBM Plex Mono',monospace;\">rm<\u002Fcode> (bits 2:0 — the other operand, either a register number or part of a memory-address description, depending on <code style=\"font-family:'IBM Plex Mono',monospace;\">mod<\u002Fcode>).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">mod == 0b11<\u002Fcode> (the \"register-direct\" mode — <code style=\"font-family:'IBM Plex Mono',monospace;\">rm<\u002Fcode> names a plain register, not a memory address, so no further address bytes follow); <code style=\"font-family:'IBM Plex Mono',monospace;\">rm == 0b100<\u002Fcode> with <code style=\"font-family:'IBM Plex Mono',monospace;\">mod != 0b11<\u002Fcode> (this specific bit pattern is reserved to mean \"a SIB byte follows\", see #23, rather than naming a register); <code style=\"font-family:'IBM Plex Mono',monospace;\">mod == 0b00 &amp;&amp; rm == 0b101<\u002Fcode> (a special case meaning \"the address is relative to the current instruction pointer\" — called RIP-relative, see #24 — not \"no displacement\" as the general pattern for <code style=\"font-family:'IBM Plex Mono',monospace;\">mod==00<\u002Fcode> would suggest).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decode_common.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — bitwise operators only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">ModRM m;\ndecode_modrm(0xC7, &amp;m);\n// m.mod == 3, m.reg == 0, m.rm == 7<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 22 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">22<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">regname<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Compute a Register Name<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">A ModRM/SIB register field is only 3 bits (values 0-7), giving 8 possible registers — but x86-64 has 16. The missing bit comes from REX (#20): combine the REX bit with the 3-bit field to get a 4-bit index (0-15), then look up that index in a small table to get the actual register name to print (e.g. \"rax\", \"r9\"). Which table you use also depends on the requested width — the same index 0 means \"al\" at 8-bit width but \"rax\" at 64-bit width.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">const char *reg_name(int reg, int rex_bit, int width);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>3-bit reg/rm field, the matching REX bit (R, X, or B — 0 or 1), operand width in bits (8/16/32/64).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Pointer to a <b>static, read-only string<\u002Fb> from an internal name table (e.g. \"rax\", \"r9d\", \"sil\") — never allocated, never freed by the caller.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">width == 8<\u002Fcode> without REX (indices 4-7 mean \"ah/ch/dh/bh\", not \"spl/bpl/sil/dil\" — only reachable with REX present); index 4 at width 64 with no REX (\"rsp\"); all 16 possible indices must resolve to distinct names.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decode_common.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — a static <code style=\"font-family:'IBM Plex Mono',monospace;\">const char*<\u002Fcode> lookup table, indexed directly.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">reg_name(0, 0, 64);   // \"rax\"\nreg_name(0, 1, 64);   // \"r8\"\nreg_name(4, 0, 8);    // \"ah\"   (no REX present)<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 23 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">23<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">sib<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode the SIB Byte<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">ModRM's <code style=\"font-family:'IBM Plex Mono',monospace;\">rm<\u002Fcode> field can only describe simple memory addresses (\"the address in this one register\"). To support the more elaborate form used by array/struct access — <code style=\"font-family:'IBM Plex Mono',monospace;\">base + index*scale<\u002Fcode>, e.g. \"start at %rbp, then add %rax multiplied by 4\" — x86 adds one more optional byte right after ModRM, called the \"SIB\" byte (Scale-Index-Base). It's present exactly when ModRM signaled it (<code style=\"font-family:'IBM Plex Mono',monospace;\">rm == 0b100<\u002Fcode> with <code style=\"font-family:'IBM Plex Mono',monospace;\">mod != 0b11<\u002Fcode>), and it packs three fields: a scale multiplier (1, 2, 4, or 8 — matching the size in bytes of an array element), which register to use as the index, and which register to use as the base.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">void decode_sib(uint8_t byte, SIB *out);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>A single byte, present only when ModRM.rm == 0b100 and mod != 0b11; <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode> is caller-allocated.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Fills <code style=\"font-family:'IBM Plex Mono',monospace;\">scale<\u002Fcode> (bits 7:6, but converted from the raw 2-bit value 0-3 into the actual multiplier 1/2/4/8 — i.e. <code style=\"font-family:'IBM Plex Mono',monospace;\">1 &lt;&lt; raw<\u002Fcode>), <code style=\"font-family:'IBM Plex Mono',monospace;\">index<\u002Fcode> (bits 5:3, the index register's number before REX extends it), <code style=\"font-family:'IBM Plex Mono',monospace;\">base<\u002Fcode> (bits 2:0, the base register's number before REX extends it).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">index == 0b100<\u002Fcode> with no REX.X bit set (this specific pattern is reserved to mean \"there is no index register at all\" — i.e. plain <code style=\"font-family:'IBM Plex Mono',monospace;\">base<\u002Fcode>-only addressing — rather than literally meaning \"use rsp as the index\", which isn't possible); <code style=\"font-family:'IBM Plex Mono',monospace;\">base == 0b101<\u002Fcode> with <code style=\"font-family:'IBM Plex Mono',monospace;\">mod == 0b00<\u002Fcode> (reserved to mean \"there is no base register either — a 4-byte constant address follows instead\").<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decode_common.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — bitwise operators only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">SIB s;\ndecode_sib(0x8D, &amp;s);   // s.scale == 4, s.index == 1, s.base == 5<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 24 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">24<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">dispmode<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Determine the Displacement Mode<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">When an instruction's operand is a memory address, that address is often given as \"register + constant offset\" (e.g. \"8 bytes before whatever %rbp points at\", to reach a local variable). That constant offset is called a \"displacement\", and it can be encoded as either 1 byte (<code style=\"font-family:'IBM Plex Mono',monospace;\">DISP8<\u002Fcode>, a small offset, sign-extended — see #4) or 4 bytes (<code style=\"font-family:'IBM Plex Mono',monospace;\">DISP32<\u002Fcode>, for larger offsets) right after ModRM/SIB — or there may be no displacement at all (<code style=\"font-family:'IBM Plex Mono',monospace;\">DISP_NONE<\u002Fcode>). Two special combinations of <code style=\"font-family:'IBM Plex Mono',monospace;\">mod<\u002Fcode>/<code style=\"font-family:'IBM Plex Mono',monospace;\">rm<\u002Fcode>/<code style=\"font-family:'IBM Plex Mono',monospace;\">SIB.base<\u002Fcode> that would otherwise mean \"no displacement\" are instead repurposed by the CPU designers to mean something else entirely (see the edge cases) — that repurposing is what makes this the trickiest branch in x86 decoding, and this function's whole job is to work out which of the five cases applies before you try to read any displacement bytes.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">DispMode displacement_mode(ModRM m, bool has_sib, SIB s);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Decoded ModRM, whether a SIB byte is present, decoded SIB (ignored if not present). Passed by value, no pointers.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>One of <code style=\"font-family:'IBM Plex Mono',monospace;\">DISP_NONE, DISP8, DISP32, DISP32_RIP_RELATIVE, DISP32_NO_BASE<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">mod==00,rm==101<\u002Fcode> → <code style=\"font-family:'IBM Plex Mono',monospace;\">DISP32_RIP_RELATIVE<\u002Fcode>: instead of \"no displacement\", this pattern means the address is computed relative to the address of the *next* instruction (the CPU's instruction pointer, \"RIP\") — useful for referring to nearby data without knowing where in memory the program will ultimately be loaded; <code style=\"font-family:'IBM Plex Mono',monospace;\">mod==00<\u002Fcode> with a SIB byte present and <code style=\"font-family:'IBM Plex Mono',monospace;\">sib.base==101<\u002Fcode> → <code style=\"font-family:'IBM Plex Mono',monospace;\">DISP32_NO_BASE<\u002Fcode>: similarly repurposed to mean \"no base register, just a plain 4-byte address\"; <code style=\"font-family:'IBM Plex Mono',monospace;\">mod==01<\u002Fcode> → always <code style=\"font-family:'IBM Plex Mono',monospace;\">DISP8<\u002Fcode>, regardless of whether a SIB byte is present; <code style=\"font-family:'IBM Plex Mono',monospace;\">mod==11<\u002Fcode> → <code style=\"font-family:'IBM Plex Mono',monospace;\">DISP_NONE<\u002Fcode> (there's no memory address at all here — <code style=\"font-family:'IBM Plex Mono',monospace;\">rm<\u002Fcode> just names a register directly).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decode_common.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — plain conditionals only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">ModRM m = {.mod = 0, .reg = 0, .rm = 5};\nDispMode dm = displacement_mode(m, false, (SIB){0});\n// dm == DISP32_RIP_RELATIVE<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 25 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0 40px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">25<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">immread<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Read the Trailing Displacement/Immediate<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Once you know a displacement is present (#24) or an instruction needs a literal constant operand baked into it (called an \"immediate\" — e.g. the 42 in \"add 42 to this register\"), this function actually reads those trailing bytes and turns them into a usable number. The last generic primitive before Chapter 5's opcode-specific decoders.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">int64_t read_disp_or_imm(const uint8_t *p, int size, bool is_signed);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Pointer just past ModRM/SIB (read-only, caller-owned), byte width to read (1, 2, 4, or 8), sign- vs. zero-extend.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Extracted value, extended to <code style=\"font-family:'IBM Plex Mono',monospace;\">int64_t<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">size == 8<\u002Fcode> (only the MOV-imm64 form, #28, uses this); <code style=\"font-family:'IBM Plex Mono',monospace;\">is_signed == false<\u002Fcode> with <code style=\"font-family:'IBM Plex Mono',monospace;\">size == 4<\u002Fcode> near <code style=\"font-family:'IBM Plex Mono',monospace;\">UINT32_MAX<\u002Fcode> (must not accidentally sign-extend); <code style=\"font-family:'IBM Plex Mono',monospace;\">size == 0<\u002Fcode> (return 0, consume nothing).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decode_common.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Your own <code style=\"font-family:'IBM Plex Mono',monospace;\">sign_extend<\u002Fcode> from #4.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t bytes[4] = {0xF8, 0xFF, 0xFF, 0xFF};\nread_disp_or_imm(bytes, 4, true);   // -8<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ============ CHAPTER 5 ============ -->\n  <section id=\"ch5\" style=\"max-width:900px; margin:0 auto; padding:40px 48px 8px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:13px; letter-spacing:0.1em; text-transform:uppercase;\">Chapter 5 / 6<\u002Fdiv>\n    <h2 style=\"font-size:28px; margin:6px 0 4px;\">Decoding Individual Instructions<\u002Fh2>\n    <p style=\"color:var(--muted); font-size:14px; margin:0 0 4px;\">Twelve opcodes, one encoding form each — the curated core (mov, arithmetic, stack ops, control flow). An \"opcode\" is the byte (or two bytes) that names which operation an instruction performs; a \"mnemonic\" is the short human-readable name for that operation used in printed output (e.g. the opcode byte <code style=\"font-family:'IBM Plex Mono',monospace;\">0x89<\u002Fcode> has the mnemonic \"mov\"). The output syntax below follows AT&amp;T convention (the style objdump and GNU tools use by default): register names are written with a <code style=\"font-family:'IBM Plex Mono',monospace;\">%<\u002Fcode> prefix (<code style=\"font-family:'IBM Plex Mono',monospace;\">%rax<\u002Fcode>), constant/literal operands get a <code style=\"font-family:'IBM Plex Mono',monospace;\">$<\u002Fcode> prefix (<code style=\"font-family:'IBM Plex Mono',monospace;\">$0x2a<\u002Fcode>), a memory address is written <code style=\"font-family:'IBM Plex Mono',monospace;\">disp(base,index,scale)<\u002Fcode> (any of which may be omitted — e.g. <code style=\"font-family:'IBM Plex Mono',monospace;\">-0x8(%rbp)<\u002Fcode> means \"8 bytes before whatever %rbp points at\"), and for two-operand instructions the source comes first and the destination second (the opposite order from Intel-syntax tools like MASM — so \"mov %rax, %rbx\" means \"copy %rax into %rbx\", not the other way around).<\u002Fp>\n    <div style=\"background:var(--card); border:1px solid var(--border); border-radius:6px; padding:12px 16px; font-size:13px; color:var(--muted); margin:12px 0 8px; font-family:'IBM Plex Mono',monospace; white-space:pre;\">typedef struct {\n  uint64_t address;   // this instruction's address\n  int length;         // bytes consumed\n  char mnemonic[8];   // e.g. \"mov\", \"call\" -- always NUL-terminated\n  char operands[64];  // e.g. \"%rax, -0x8(%rbp)\" -- always NUL-terminated\n  uint64_t target;    // absolute branch target; set only by call/jmp/jcc, else 0\n} Instruction;<\u002Fdiv>\n    <p style=\"color:var(--muted); font-size:13px; margin:0 0 8px;\">\n      Shared signature for all 12 decoders: <code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:1px 5px; border-radius:3px;\">int decode_X(const uint8_t *ip, uint64_t addr, Instruction *out);<\u002Fcode> — returns total bytes consumed, or <code style=\"font-family:'IBM Plex Mono',monospace;\">-1<\u002Fcode> if the bytes at <code style=\"font-family:'IBM Plex Mono',monospace;\">ip<\u002Fcode> don't match this opcode. <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode> points at a caller-allocated <code style=\"font-family:'IBM Plex Mono',monospace;\">Instruction<\u002Fcode> (a stack variable) — the decoder writes into its fixed-size arrays directly; no heap allocation anywhere in this chapter.\n    <\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"max-width:900px; margin:0 auto; padding:0 48px;\">\n\n    <!-- EX 26 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">26<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">mov89<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode MOV r/m64, r64<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">opcode 0x89 /r<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">The first real instruction decoder. The <code style=\"font-family:'IBM Plex Mono',monospace;\">/r<\u002Fcode> in \"opcode 0x89 /r\" is standard notation meaning \"a ModRM byte follows, and its reg/rm fields both name registers or memory\" (as opposed to some opcodes where ModRM's reg field is repurposed to pick between several related operations instead of naming a register). For this specific opcode, the destination is always whatever ModRM's r/m field describes (a register, or a memory location), and the source is always ModRM's reg field — that fixed direction is baked into the opcode byte itself, which is why #27 exists as a separate opcode with the direction reversed.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT<\u002Fdiv>\n          <div>Bytes at <code style=\"font-family:'IBM Plex Mono',monospace;\">ip<\u002Fcode>: optional REX.W, then <code style=\"font-family:'IBM Plex Mono',monospace;\">0x89<\u002Fcode>, then ModRM (+ SIB, + displacement).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Length consumed; <code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;mnemonic=\"mov\"<\u002Fcode>; <code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;operands<\u002Fcode> = \"&lt;dst&gt;, &lt;src&gt;\" in objdump order — memory rendered like <code style=\"font-family:'IBM Plex Mono',monospace;\">-0x8(%rbp)<\u002Fcode> or <code style=\"font-family:'IBM Plex Mono',monospace;\">0x10(%rax,%rbx,4)<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Destination is memory, source is register (this opcode's fixed direction — don't swap with 0x8B); <code style=\"font-family:'IBM Plex Mono',monospace;\">mod==11<\u002Fcode> (register-to-register, no memory syntax); no REX.W present (32-bit operand size, narrower register names, still correct decode).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0x48, 0x89, 0xC3};   // mov %rax, %rbx\nInstruction ins;                       // caller-allocated\nint len = decode_mov_rm64_r64(code, 0x401000, &amp;ins);\n// len == 3, ins.mnemonic == \"mov\", ins.operands == \"%rax, %rbx\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 27 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">27<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">mov8b<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode MOV r64, r/m64<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">opcode 0x8B /r<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Same shape as #26, mirrored operand direction — the pair together cover both MOV directions.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT<\u002Fdiv>\n          <div>Same byte shape as #26 but opcode <code style=\"font-family:'IBM Plex Mono',monospace;\">0x8B<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;operands<\u002Fcode> with the reg field first, r/m second — the mirror image of #26's ordering.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Byte at <code style=\"font-family:'IBM Plex Mono',monospace;\">ip<\u002Fcode> is <code style=\"font-family:'IBM Plex Mono',monospace;\">0x89<\u002Fcode> not <code style=\"font-family:'IBM Plex Mono',monospace;\">0x8B<\u002Fcode> (must return -1, not misdecode); RIP-relative form (<code style=\"font-family:'IBM Plex Mono',monospace;\">mod==00,rm==101<\u002Fcode>) producing a <code style=\"font-family:'IBM Plex Mono',monospace;\">0x123(%rip)<\u002Fcode>-style operand.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Same as #26 — your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0x48, 0x8B, 0x45, 0xF8};   // mov -0x8(%rbp), %rax\nInstruction ins;\nint len = decode_mov_r64_rm64(code, 0x401000, &amp;ins);\n// len == 4, ins.operands == \"-0x8(%rbp), %rax\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 28 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">28<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">movabs<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode MOV r64, imm64<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">opcode 0xB8+rd, REX.W required<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">The register is encoded directly in the opcode byte (same \"+rd\" scheme as #32), and this is the one form here with a full 8-byte immediate — a literal constant value baked straight into the instruction bytes, as opposed to a value stored in a register or memory (this is what makes it possible to load any arbitrary 64-bit constant into a register in one instruction).<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT<\u002Fdiv>\n          <div>REX with W=1, opcode byte in <code style=\"font-family:'IBM Plex Mono',monospace;\">[0xB8,0xBF]<\u002Fcode> (register = low 3 bits + REX.B), 8 raw immediate bytes.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;operands<\u002Fcode> = \"$&lt;hex-imm64&gt;, &lt;reg&gt;\"; length = prefix + 1 + 8.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Opcode byte without REX.W (that's the 32-bit MOV r32,imm32 form — out of scope, return -1 here); REX.B set (selects r8-r15 instead of rax-rdi).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Same as #26 — your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0x48,0xB8, 0x2A,0,0,0,0,0,0,0};   // movabs $0x2a, %rax\nInstruction ins;\nint len = decode_mov_r64_imm64(code, 0x401000, &amp;ins);\n// len == 10, ins.operands == \"$0x2a, %rax\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 29 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">29<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">add01<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode ADD r/m64, r64<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">opcode 0x01 /r<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Structurally identical to #26 — reusing that shape is the point.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT<\u002Fdiv>\n          <div>Same shape as #26 with opcode <code style=\"font-family:'IBM Plex Mono',monospace;\">0x01<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;mnemonic=\"add\"<\u002Fcode>, same operand-ordering convention as #26.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Same register used for both operands (<code style=\"font-family:'IBM Plex Mono',monospace;\">add %rax, %rax<\u002Fcode>); memory destination (decode doesn't change for read-modify-write semantics, only the eventual execution would).<\u002Fdiv>\n          <div style=\"font-family:'IBM P
