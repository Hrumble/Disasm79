lex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Same as #26 — your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0x48, 0x01, 0xD8};   // add %rbx, %rax\nInstruction ins;\nint len = decode_add_rm64_r64(code, 0x401000, &amp;ins);\n// len == 3, ins.operands == \"%rax, %rbx\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 30 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">30<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">sub29<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode SUB r/m64, r64<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">opcode 0x29 /r<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Mirrors #29 with a different mnemonic — and a reminder that neighboring opcodes are deliberately unsupported.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT<\u002Fdiv>\n          <div>Same shape as #29 with opcode <code style=\"font-family:'IBM Plex Mono',monospace;\">0x29<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;mnemonic=\"sub\"<\u002Fcode>, same operand convention.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Must return -1 for the reg/rm-reversed SUB (<code style=\"font-family:'IBM Plex Mono',monospace;\">0x2B<\u002Fcode>) and the 8-bit forms (<code style=\"font-family:'IBM Plex Mono',monospace;\">0x28<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">0x2A<\u002Fcode>) — all intentionally out of scope, not silently misdecoded.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Same as #26 — your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0x48, 0x29, 0xD8};   // sub %rbx, %rax\nInstruction ins;\nint len = decode_sub_rm64_r64(code, 0x401000, &amp;ins);\n// len == 3, ins.mnemonic == \"sub\", ins.operands == \"%rax, %rbx\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 31 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">31<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">cmp39<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode CMP r/m64, r64<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">opcode 0x39 /r<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">The last of the three arithmetic-shaped decoders — sets up the conditional jumps in #37.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT<\u002Fdiv>\n          <div>Same shape as #29/#30 with opcode <code style=\"font-family:'IBM Plex Mono',monospace;\">0x39<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;mnemonic=\"cmp\"<\u002Fcode>, same operand convention.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Must reject the sibling opcodes you did not implement (<code style=\"font-family:'IBM Plex Mono',monospace;\">0x3B<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">0x38<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">0x3A<\u002Fcode>) rather than misdecoding them.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Same as #26 — your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0x48, 0x39, 0xD8};   // cmp %rbx, %rax\nInstruction ins;\nint len = decode_cmp_rm64_r64(code, 0x401000, &amp;ins);\n// len == 3, ins.mnemonic == \"cmp\", ins.operands == \"%rax, %rbx\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 32 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">32<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">push50<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode PUSH r64<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">opcode 0x50+rd<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">First form where the register is baked directly into the opcode byte itself, rather than named by a separate ModRM byte. The \"+rd\" in \"opcode 0x50+rd\" is standard notation meaning: take the base opcode <code style=\"font-family:'IBM Plex Mono',monospace;\">0x50<\u002Fcode> and add a register number 0-7 to it, so <code style=\"font-family:'IBM Plex Mono',monospace;\">0x50<\u002Fcode> itself means \"push register 0\", <code style=\"font-family:'IBM Plex Mono',monospace;\">0x51<\u002Fcode> means \"push register 1\", and so on up to <code style=\"font-family:'IBM Plex Mono',monospace;\">0x57<\u002Fcode> for register 7 — giving 8 opcode bytes that all mean \"push\", differing only in which register.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT<\u002Fdiv>\n          <div>Optional REX.B, opcode byte in <code style=\"font-family:'IBM Plex Mono',monospace;\">[0x50,0x57]<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;mnemonic=\"push\"<\u002Fcode>, single register operand; no ModRM byte at all.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>PUSH has no 32-bit form in 64-bit mode — REX.W is simply not consulted here (don't require or reject it); REX.B selects r8-r15.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Same as #26 — your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0x55};   // push %rbp\nInstruction ins;\nint len = decode_push_r64(code, 0x401000, &amp;ins);\n// len == 1, ins.mnemonic == \"push\", ins.operands == \"%rbp\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 33 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">33<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">pop58<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode POP r64<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">opcode 0x58+rd<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Mirrors #32 in the adjacent opcode range.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT<\u002Fdiv>\n          <div>Optional REX.B, opcode byte in <code style=\"font-family:'IBM Plex Mono',monospace;\">[0x58,0x5F]<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;mnemonic=\"pop\"<\u002Fcode>, single register operand.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Same REX.W-is-irrelevant note as #32; must not confuse this opcode range with PUSH's <code style=\"font-family:'IBM Plex Mono',monospace;\">[0x50,0x57]<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Same as #26 — your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0x5D};   // pop %rbp\nInstruction ins;\nint len = decode_pop_r64(code, 0x401009, &amp;ins);\n// len == 1, ins.mnemonic == \"pop\", ins.operands == \"%rbp\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 34 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">34<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">retc3<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode RET<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">opcode 0xC3<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">The simplest decoder in the set — a good sanity check before the branch instructions.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT<\u002Fdiv>\n          <div>Single opcode byte, no ModRM, no operands, no prefixes expected.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;mnemonic=\"ret\"<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;operands[0]='\\0'<\u002Fcode>, length always 1.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>The near-RET-with-imm16 form (<code style=\"font-family:'IBM Plex Mono',monospace;\">0xC2<\u002Fcode>) is a different opcode, out of scope — must return -1 for it, not decode it as plain RET.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Same as #26 — your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0xC3};\nInstruction ins;\nint len = decode_ret(code, 0x401005, &amp;ins);\n// len == 1, ins.mnemonic == \"ret\", ins.operands == \"\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 35 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">35<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">calle8<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode CALL rel32<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">opcode 0xE8<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">CALL and JMP (below) encode their destination as a \"relative displacement\" rather than an absolute address: the 4 bytes after the opcode are a signed number of bytes to add to the address of the *instruction right after this one* (not this instruction's own address) to get the actual target. This is what lets the same compiled bytes work no matter where in memory the program ends up loaded — the offset between two instructions doesn't change even if the whole file is loaded somewhere else. \"rel32\" is the conventional name for this 4-byte signed relative offset.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">int decode_call_rel32(const uint8_t *ip, uint64_t addr, Instruction *out);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Opcode byte <code style=\"font-family:'IBM Plex Mono',monospace;\">0xE8<\u002Fcode>, then 4 raw little-endian bytes (signed rel32).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Length = 5; <code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;target = addr + 5 + rel32<\u002Fcode> (absolute address, for #40's symbol resolution); <code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;operands<\u002Fcode> holds that hex address as text for now.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>A negative rel32 (a branch backward in the file — must sign-extend it per #4, not treat the 4 bytes as an unsigned number, or you'll compute a wildly wrong target); the computed target landing outside <code style=\"font-family:'IBM Plex Mono',monospace;\">.text<\u002Fcode> entirely (this is completely normal — it means the call is to a function defined in a different source file, to be filled in later by the linker; you must not crash, just leave it unresolved for now).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Same as #26 — your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0xE8, 0x1B,0x00,0x00,0x00};   // call rel32 = 0x1b\nInstruction ins;\nint len = decode_call_rel32(code, 0x401010, &amp;ins);\n// len == 5, ins.target == 0x401010 + 5 + 0x1b == 0x40102e<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 36 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">36<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">jmpe9<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode JMP rel32<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">opcode 0xE9<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Identical shape to #35 with a different mnemonic and no return semantics.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT<\u002Fdiv>\n          <div>Same shape as #35 with opcode <code style=\"font-family:'IBM Plex Mono',monospace;\">0xE9<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;mnemonic=\"jmp\"<\u002Fcode>, same target computation as #35.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Same signed-displacement care as #35; must not confuse with the short-form JMP rel8 (<code style=\"font-family:'IBM Plex Mono',monospace;\">0xEB<\u002Fcode>), intentionally out of scope — return -1 for it.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Same as #26 — your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0xE9, 0xF6,0xFF,0xFF,0xFF};   // jmp rel32 = -10 (backward)\nInstruction ins;\nint len = decode_jmp_rel32(code, 0x401030, &amp;ins);\n// len == 5, ins.target == 0x401030 + 5 - 10 == 0x401029<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 37 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0 40px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">37<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">jcc0f<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Decode Jcc rel32<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">two-byte opcode 0x0F 8x<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">The last decoder, and the first \"two-byte opcode\" — most opcodes are a single byte, but a handful of operations (including all the conditional jumps) are identified by the byte <code style=\"font-family:'IBM Plex Mono',monospace;\">0x0F<\u002Fcode> followed by a second byte that narrows down which specific operation it is. Here, the low 4 bits of that second byte select which condition to branch on — e.g. <code style=\"font-family:'IBM Plex Mono',monospace;\">0x84<\u002Fcode> = \"jump if equal\" (mnemonic \"je\"), <code style=\"font-family:'IBM Plex Mono',monospace;\">0x85<\u002Fcode> = \"jump if not equal\" (\"jne\"), and so on — these conditional jumps are what CMP (#31) sets up: CMP itself doesn't branch, it just leaves a result that a following Jcc instruction reacts to.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">int decode_jcc_rel32(const uint8_t *ip, uint64_t addr, Instruction *out);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">0x0F<\u002Fcode>, then a byte in <code style=\"font-family:'IBM Plex Mono',monospace;\">[0x80,0x8F]<\u002Fcode>, then 4 raw little-endian bytes (signed rel32).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Length = 6; <code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;mnemonic<\u002Fcode> from a condition-code table (\"je\",\"jne\",\"jl\",\"jge\",…); <code style=\"font-family:'IBM Plex Mono',monospace;\">out-&gt;target = addr + 6 + rel32<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>First byte <code style=\"font-family:'IBM Plex Mono',monospace;\">0x0F<\u002Fcode> but second byte outside <code style=\"font-family:'IBM Plex Mono',monospace;\">[0x80,0x8F]<\u002Fcode> (a different two-byte opcode entirely — return -1); must map all 16 condition codes correctly, not just the common few.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">decoders.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Same as #26 — your own <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_rex<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_modrm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_sib<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">displacement_mode<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read_disp_or_imm<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">reg_name<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0x0F, 0x84, 0x0A,0x00,0x00,0x00};   // je rel32 = 0x0a\nInstruction ins;\nint len = decode_jcc_rel32(code, 0x401020, &amp;ins);\n// len == 6, ins.mnemonic == \"je\", ins.target == 0x401020+6+0x0a == 0x40102c<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ============ CHAPTER 6 ============ -->\n  <section id=\"ch6\" style=\"max-width:900px; margin:0 auto; padding:40px 48px 8px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:13px; letter-spacing:0.1em; text-transform:uppercase;\">Chapter 6 / 6<\u002Fdiv>\n    <h2 style=\"font-size:28px; margin:6px 0 4px;\">Assembling the Disassembler<\u002Fh2>\n    <p style=\"color:var(--muted); font-size:14px; margin:0 0 8px;\">Wire every prior chapter together into one working pipeline: load → validate → find sections → parse symbols → decode → resolve labels → print. Nothing new to learn here conceptually — it's assembling pieces you've already built, in the right order.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"max-width:900px; margin:0 auto; padding:0 48px;\">\n\n    <!-- EX 38 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">38<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">dispatch<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Build the Opcode Dispatch Table<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Right now, decoding a given instruction means trying each Chapter 5 decoder one at a time and seeing which one accepts the bytes — that works, but as a naive if/else chain it gets unwieldy and error-prone as the list grows. This function centralizes that logic: an ordered list of every Chapter 5 decoder, tried in sequence until one succeeds.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">int dispatch_decode(const uint8_t *ip, uint64_t addr, Instruction *out);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Pointer into .text, current address; <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode> caller-allocated, same as every Chapter 5 decoder.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Tries each Chapter 5 decoder in a defined order (two-byte 0x0F opcodes before anything that could shadow them); returns the winning decoder's length, or -1 if nothing in the curated core matches.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>An opcode byte that's legitimately outside your curated set of 12 forms (real compiled code has plenty of these — <code style=\"font-family:'IBM Plex Mono',monospace;\">nop<\u002Fcode>, floating-point instructions, string instructions, etc. — must fail cleanly by returning -1, not accidentally match one of your 12 decoders and misdecode); two decoders that could both match the same starting bytes (the order you try them in matters — e.g. the two-byte <code style=\"font-family:'IBM Plex Mono',monospace;\">0x0F<\u002Fcode>-prefixed Jcc form must be checked in a way that doesn't get confused with single-byte opcodes).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">dispatch.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>Your Chapter 5 <code style=\"font-family:'IBM Plex Mono',monospace;\">decode_*<\u002Fcode> functions.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t code[] = {0x55};   // push %rbp\nInstruction ins;\nint len = dispatch_decode(code, 0x401000, &amp;ins);\n// len == 1, ins.mnemonic == \"push\"\n\nuint8_t unknown[] = {0x90};   // nop -- not in the curated core\nint len2 = dispatch_decode(unknown, 0x401001, &amp;ins);\n// len2 == -1<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 39 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">39<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">sweep<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Linear-Sweep a Function's Bytes<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">A single function is just a sequence of instructions packed back-to-back with no gaps or separators — to print all of them, you start at the function's first byte, decode one instruction, then jump forward by exactly that instruction's length to find the start of the next one, repeating until you reach the function's end. This straightforward walk-forward-through-memory approach is called \"linear sweep\" disassembly (as opposed to more sophisticated approaches that follow the program's actual control flow).<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">size_t disassemble_range(const uint8_t *text, uint64_t base_addr, uint64_t start, uint64_t end, Instruction *out, size_t max_out);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Pointer to .text's bytes, its load address (0 for a raw unrelocated .o), start/end offsets from a function's range (#17); <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode> is a <b>caller-allocated array<\u002Fb> (e.g. <code style=\"font-family:'IBM Plex Mono',monospace;\">Instruction out[256]<\u002Fcode> on the stack, or a malloc'd block) of capacity <code style=\"font-family:'IBM Plex Mono',monospace;\">max_out<\u002Fcode> — the function does not allocate it.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Number of instructions written into <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode>, in address order.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">dispatch_decode<\u002Fcode> returns -1 mid-function (an opcode outside the curated core — emit a placeholder entry instead of stopping, so one unsupported instruction doesn't derail the whole function: give it mnemonic <code style=\"font-family:'IBM Plex Mono',monospace;\">.byte<\u002Fcode> and operand text showing that one raw byte's hex value, e.g. \"0x90\", set <code style=\"font-family:'IBM Plex Mono',monospace;\">length=1<\u002Fcode>, and advance exactly 1 byte before trying again); reaching <code style=\"font-family:'IBM Plex Mono',monospace;\">end<\u002Fcode> mid-instruction (a truncated function — same placeholder fallback); <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode> fills up before <code style=\"font-family:'IBM Plex Mono',monospace;\">end<\u002Fcode> is reached (stop at <code style=\"font-family:'IBM Plex Mono',monospace;\">max_out<\u002Fcode>, don't write past the array).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">sweep.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">dispatch_decode<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">Instruction out[256];       // caller-allocated, fixed capacity\nsize_t n = disassemble_range(text_bytes, 0, funcs[0].sym.st_value, funcs[0].end, out, 256);\n// out[0..n) holds every instruction in funcs[0], in order<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 40 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">40<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">labelize<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Resolve Jump/Call Targets to Symbol Names<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">CALL/JMP/Jcc decoders (#35-37) computed each branch's absolute target address, but only stored it as a raw number. This function converts those raw numbers into human-readable labels wherever possible, by looking each one up against the function table (#17-18) — turning \"call 401024\" into the far more readable \"call 401024 &lt;helper&gt;\".<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">void resolve_targets(Instruction *instrs, size_t count, const Sym *funcs, size_t func_count);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>The decoded instruction array from #39 (mutated in place — no return value, no allocation), the function symbol table from #17/#18.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>For every instruction with a nonzero <code style=\"font-family:'IBM Plex Mono',monospace;\">target<\u002Fcode> (CALL/JMP/Jcc), looks it up via <code style=\"font-family:'IBM Plex Mono',monospace;\">addr_to_function<\u002Fcode> and, if found, appends \" &lt;funcname&gt;\" directly into that instruction's fixed-size <code style=\"font-family:'IBM Plex Mono',monospace;\">operands<\u002Fcode> buffer (must not overflow it); leaves the raw hex address untouched if no match.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Target lands exactly on a function's start (should resolve); target lands mid-function — e.g. a loop's backward jump to a point partway through the same function it started in — should still resolve to that enclosing function's name (not fail just because it's not exactly at the start); target is an address <code style=\"font-family:'IBM Plex Mono',monospace;\">addr_to_function<\u002Fcode> can't find any function for, typically because it's a call to a function defined in a different source file and only filled in later, when the linker combines files (no match here is the correct, expected outcome — not a bug to fix).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">labels.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">symbols.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">addr_to_function<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">resolve_targets(out, n, funcs, nfuncs);\n// out[k].operands changes from \"0x401030\" to \"0x401030 &lt;helper&gt;\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 41 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">41<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">objline<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Format One objdump-Style Line<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Every earlier decoder produced a structured <code style=\"font-family:'IBM Plex Mono',monospace;\">Instruction<\u002Fcode> record; this is the presentation layer that turns one such record into a single line of readable text, matching the layout the standard Linux tool <code style=\"font-family:'IBM Plex Mono',monospace;\">objdump -d<\u002Fcode> uses — this is the exact line format your final program (#42) prints, once per instruction.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">void format_line(const uint8_t *raw_bytes, const Instruction *ins, char *out, size_t outlen);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Pointer to this instruction's raw bytes in .text (for the hex-bytes column, <code style=\"font-family:'IBM Plex Mono',monospace;\">ins-&gt;length<\u002Fcode> of them), the decoded instruction; <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode> is a <b>caller-allocated <code style=\"font-family:'IBM Plex Mono',monospace;\">char<\u002Fcode> buffer<\u002Fb> (e.g. <code style=\"font-family:'IBM Plex Mono',monospace;\">char line[128]<\u002Fcode>) of size <code style=\"font-family:'IBM Plex Mono',monospace;\">outlen<\u002Fcode> — no allocation inside the function.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Writes a NUL-terminated line into <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode>, with four parts separated by tabs, left to right: (1) the instruction's address, in hex; (2) its raw bytes, each as two hex digits with a space between them (so you can see exactly which bytes the mnemonic and operands came from); (3) the mnemonic, padded with spaces to a fixed width so operands line up in a column across every line; (4) the operand text. For example: <code style=\"font-family:'IBM Plex Mono',monospace;\">401000:<\u002Fcode>, tab, <code style=\"font-family:'IBM Plex Mono',monospace;\">55<\u002Fcode>, tab, <code style=\"font-family:'IBM Plex Mono',monospace;\">push<\u002Fcode> (padded out to some fixed column width), <code style=\"font-family:'IBM Plex Mono',monospace;\">%rbp<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>An instruction whose raw bytes are too long to fit the hex-bytes column at whatever fixed width you pick (real objdump wraps these onto extra lines — you may instead just let the column widen for that one line, as long as you document the choice); zero-operand instructions like RET, which must still leave the mnemonic correctly padded/aligned even with nothing after it; <code style=\"font-family:'IBM Plex Mono',monospace;\">outlen<\u002Fcode> too small to hold the whole line (truncate safely — still end with a NUL byte, never write past the buffer).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">format.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">decode.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — hand-roll all hex/decimal formatting and column padding with pointer arithmetic only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">char line[128];\nformat_line(&amp;code[0], &amp;ins, line, sizeof(line));\nputs(line);\n// \"  401000:\\t55                   \\tpush   %rbp\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 42 FINAL -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:26px 0 8px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">42<\u002Fdiv>\n      <div style=\"background:var(--card); border:1px solid var(--accent); border-radius:8px; padding:20px 22px;\">\n        <div style=\"display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;\">\n          <h3 style=\"margin:0; font-size:21px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">disasm<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:14px; font-weight:400; color:var(--muted); margin-left:10px;\">The Full Disassembler — .o → Machine Instructions<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--bg); background:var(--accent); border-radius:3px; padding:2px 7px; font-weight:600;\">FINAL PROJECT<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">PROGRAM<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:8px 0 14px; color:var(--muted); font-size:13.5px; font-style:italic;\">Every earlier exercise is one stage of this pipeline: load file (#2) → validate ELF (#7-9) → find .text/.symtab/.strtab (#10-13) → parse symbols &amp; ranges (#14-18) → decode instructions (#19-38) → sweep &amp; resolve labels (#39-40) → print (#41).<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT FORMAT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">./disasm path/to/file.o<\u002Fcode> — a single argv[1], a real ELF64 ET_REL x86-64 object (e.g. from <code style=\"font-family:'IBM Plex Mono',monospace;\">gcc -c -O0 prog.c -o prog.o<\u002Fcode>).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EXPECTED INPUT<\u002Fdiv>\n          <div>Any well-formed x86-64 .o. Correctness is only guaranteed for code built from the 12 forms in Chapter 5 (mov/add/sub/cmp/push/pop/ret/call/jmp/jcc) — anything else degrades gracefully rather than crashing.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EXPECTED OUTPUT<\u002Fdiv>\n          <div>To stdout, one block per function symbol (in ascending address order): a header line naming the function (\"&lt;funcname&gt;:\"), followed by that function's instructions, one objdump-style line (#41) each, with jump/call targets resolved to symbol names (#40) where possible — matching the worked example below.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Zero function symbols (print nothing, exit 0 — not an error, e.g. a fully stripped file); an opcode outside your curated core turning up mid-function (emit the <code style=\"font-family:'IBM Plex Mono',monospace;\">.byte<\u002Fcode> placeholder from #39 and keep going — one unsupported instruction must not abort the whole run); a file that fails validation (#9) — print a clear error message to stderr and exit with a nonzero status, without attempting to parse any further; a very large <code style=\"font-family:'IBM Plex Mono',monospace;\">.text<\u002Fcode> section (the whole pipeline should be one pass over the bytes, not something that gets dramatically slower as the file grows).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">disasm.c<\u002Fcode> (contains <code style=\"font-family:'IBM Plex Mono',monospace;\">main<\u002Fcode>, links every file above: <code style=\"font-family:'IBM Plex Mono',monospace;\">io, bits, elf, symbols, decode_common, decoders, dispatch, sweep, labels, format<\u002Fcode>).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">open<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">write<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">close<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">malloc<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">realloc<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">free<\u002Fcode>, plus every helper you wrote in Chapters 1-6.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-bash\">$ ./disasm prog.o\nmain:\n  401000:  55                    push   %rbp\n  401001:  48 89 e5              mov    %rsp, %rbp\n  401004:  e8 1b 00 00 00        call   401024 &lt;helper&gt;\n  401009:  90                    .byte  0x90\n  40100a:  c3                    ret\nhelper:\n  401024:  48 39 f8              cmp    %rdi, %rax\n  401027:  0f 84 0a 00 00 00     je     401037 &lt;helper&gt;\n  40102d:  c3                    ret<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div style=\"max-width:900px; margin:0 auto; padding:16px 48px 64px; color:var(--muted); font-size:12px; font-family:'IBM Plex Mono',monospace;\">— end of catalog · 42 exercises · 6 chapters —<\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this.highlight();\n  }\n  componentDidUpdate() {\n    this.highlight();\n  }\n  highlight() {\n    if (window.hljs) {\n      document.querySelectorAll('pre code.hljs').forEach((block) => {\n        if (!block.dataset.highlighted) {\n          window.hljs.highlightElement(block);\n        }\n      });\n    } else {\n      setTimeout(() => this.highlight(), 150);\n    }\n  }\n  renderVals() {\n    return {};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
