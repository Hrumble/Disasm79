document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t:700; letter-spacing:0.05em;\">DISASM/42<\u002Fspan>\n    <a href=\"#ch1\" style=\"color:var(--muted); text-decoration:none;\">01 Bytes &amp; Bits<\u002Fa>\n    <a href=\"#ch2\" style=\"color:var(--muted); text-decoration:none;\">02 ELF Structure<\u002Fa>\n    <a href=\"#ch3\" style=\"color:var(--muted); text-decoration:none;\">03 Symbols<\u002Fa>\n    <a href=\"#ch4\" style=\"color:var(--muted); text-decoration:none;\">04 Encoding Primitives<\u002Fa>\n    <a href=\"#ch5\" style=\"color:var(--muted); text-decoration:none;\">05 Instructions<\u002Fa>\n    <a href=\"#ch6\" style=\"color:var(--muted); text-decoration:none;\">06 The Disassembler<\u002Fa>\n  <\u002Fdiv>\n\n  <!-- Header -->\n  <div style=\"max-width:900px; margin:0 auto; padding:56px 48px 8px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:13px; letter-spacing:0.1em; text-transform:uppercase;\">A 42-Exercise Progression<\u002Fdiv>\n    <h1 style=\"font-size:38px; margin:8px 0 12px; font-weight:700;\">Building a Disassembler From Scratch<\u002Fh1>\n    <p style=\"color:var(--muted); font-size:15px; max-width:640px; margin:0 0 20px;\">\n      Target: x86-64. Input: real ELF64 relocatable object files (<code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:1px 5px; border-radius:3px;\">.o<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:1px 5px; border-radius:3px;\">ET_REL<\u002Fcode>). Output: objdump-style mnemonic/operand text.\n      A curated core of instruction forms (mov, add, sub, cmp, push, pop, ret, call, jmp, jcc) — one encoding per opcode, chosen for realistic coverage rather than completeness.\n    <\u002Fp>\n    <div style=\"display:flex; gap:16px; font-size:12.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace; flex-wrap:wrap;\">\n      <span><b style=\"color:var(--fg);\">FN<\u002Fb> = write this C function<\u002Fspan>\n      <span><b style=\"color:var(--fg);\">PROGRAM<\u002Fb> = write a standalone CLI tool<\u002Fspan>\n      <span>No solutions included — specs + usage examples only<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ CHAPTER 1 ============ -->\n  <section id=\"ch1\" style=\"max-width:900px; margin:0 auto; padding:56px 48px 8px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:13px; letter-spacing:0.1em; text-transform:uppercase;\">Chapter 1 / 6<\u002Fdiv>\n    <h2 style=\"font-size:28px; margin:6px 0 4px;\">Bytes &amp; Bits<\u002Fh2>\n    <p style=\"color:var(--muted); font-size:14px; margin:0 0 8px;\">Foundational buffer and bit manipulation. No ELF yet — these primitives get reused constantly from Chapter 2 onward.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"max-width:900px; margin:0 auto; padding:0 48px;\">\n\n    <!-- EX 1 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">01<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">hexdump<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Hex Dump a File<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">PROGRAM<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Before parsing any format you need to see raw bytes — the classic 16-bytes-per-row hex + ASCII dump, printed straight to stdout.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT FORMAT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">argv[1]<\u002Fcode> = path to any file, read fully into memory.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EXPECTED INPUT<\u002Fdiv>\n          <div>Any file, including an empty one.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EXPECTED OUTPUT<\u002Fdiv>\n          <div>To stdout, one line for every 16 bytes of the file, with three parts on each line:<br>1) how far into the file this line starts, in bytes, counting from 0 — written in hex and padded to 8 digits, so the very first line always begins with <code style=\"font-family:'IBM Plex Mono',monospace;\">00000000<\u002Fcode>, the second with <code style=\"font-family:'IBM Plex Mono',monospace;\">00000010<\u002Fcode> (16 in hex), and so on;<br>2) those 16 bytes' numeric values, each written as two hex digits, separated by spaces;<br>3) the same 16 bytes shown again, but as text: for each byte, print the character it represents if that character is a normal printable one (a letter, digit, punctuation, space), otherwise print <code style=\"font-family:'IBM Plex Mono',monospace;\">.<\u002Fcode> as a stand-in. (This repeated-as-text column is conventionally called the \"ASCII gutter\" — now you know what that means.)<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Empty file → no output, exit 0; final row not a full 16 bytes (i.e. the file's length isn't a multiple of 16) → pad the numeric-hex column with spaces so it still lines up visually, and the text column only shows the bytes that actually exist; nonexistent path → error to stderr, nonzero exit.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">hexdump.c<\u002Fcode> (standalone, builds to <code style=\"font-family:'IBM Plex Mono',monospace;\">./hexdump<\u002Fcode>).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">open<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">close<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">write<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">malloc<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">free<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-bash\">$ ./hexdump tiny.bin\n00000000  48 65 6c 6c 6f 2c 20 77  6f 72 6c 64 21 0a        Hello, world!.<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 2 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">02<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">slurp<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Read a File Into a Buffer<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Every later exercise starts by loading the whole .o file into memory exactly once.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">uint8_t *read_file(const char *path, size_t *out_len);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Filesystem path; <code style=\"font-family:'IBM Plex Mono',monospace;\">out_len<\u002Fcode> points at a caller-allocated <code style=\"font-family:'IBM Plex Mono',monospace;\">size_t<\u002Fcode> (a stack variable is fine).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Returns a buffer <b>malloc'd inside the function<\u002Fb>, exactly file-size bytes — the caller owns it and must <code style=\"font-family:'IBM Plex Mono',monospace;\">free()<\u002Fcode> it. <code style=\"font-family:'IBM Plex Mono',monospace;\">*out_len<\u002Fcode> set to the file size. <code style=\"font-family:'IBM Plex Mono',monospace;\">NULL<\u002Fcode> on failure (<code style=\"font-family:'IBM Plex Mono',monospace;\">*out_len<\u002Fcode> left unspecified).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>File does not exist; zero-length file (return non-NULL, 0-length allocation — not NULL); allocation failure on a huge file (return NULL); path is a directory.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">io.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">io.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">open<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">close<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">malloc<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">realloc<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">free<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">size_t len;\nuint8_t *buf = read_file(\"prog.o\", &amp;len);\nif (!buf) { perror(\"read_file\"); return 1; }\nprintf(\"read %zu bytes\\n\", len);\nfree(buf);<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 3 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">03<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">bitfield<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Extract a Bit Field<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Instruction encodings pack multiple fields into one byte (ModRM, SIB, REX) — this helper is reused constantly in Chapter 4.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">uint32_t get_bits(uint32_t value, int lo, int hi);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>A 32-bit value, inclusive low bit index, inclusive high bit index. Bits are numbered from the right, starting at 0 for the rightmost bit (this rightmost bit is conventionally called the \"LSB\", short for least-significant bit, because it's worth the least: changing it only changes the value by 1). No pointers, no allocation.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>The value's bits from position <code style=\"font-family:'IBM Plex Mono',monospace;\">lo<\u002Fcode> through <code style=\"font-family:'IBM Plex Mono',monospace;\">hi<\u002Fcode> (inclusive), pulled out and moved down so that whatever was at position <code style=\"font-family:'IBM Plex Mono',monospace;\">lo<\u002Fcode> is now at position 0 — i.e. the extracted bits read as an ordinary small number. Everything outside that bit range is discarded, not just masked to 0 alongside the answer.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">lo == hi<\u002Fcode> (single bit); <code style=\"font-family:'IBM Plex Mono',monospace;\">hi == 31<\u002Fcode> (top bit — watch signedness); <code style=\"font-family:'IBM Plex Mono',monospace;\">lo &gt; hi<\u002Fcode> is a caller error — pick and document a behavior (assert vs. return 0).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">bits.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">bits.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — bitwise operators only (<code style=\"font-family:'IBM Plex Mono',monospace;\">&amp; | ^ ~ &lt;&lt; &gt;&gt;<\u002Fcode>).<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint32_t modrm = 0xC7;             // 1100 0111\nget_bits(modrm, 6, 7);              // 0x3  (mod)\nget_bits(modrm, 3, 5);              // 0x0  (reg)\nget_bits(modrm, 0, 2);              // 0x7  (rm)<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 4 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">04<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">signext<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Sign-Extend a Value<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">x86 immediates and displacements are frequently 8-bit but must sign-extend to 32/64-bit before use.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">int64_t sign_extend(uint64_t value, int bits);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Raw unsigned value, and how many of its low bits are actually meaningful (e.g. 8 means \"this value came from a single byte\"). No pointers.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>The same bit pattern, but reinterpreted as a negative number if its top meaningful bit (bit <code style=\"font-family:'IBM Plex Mono',monospace;\">bits-1<\u002Fcode>) is 1, following the standard rule computers use for negative numbers (two's complement): copy that top bit into every higher bit position, all the way up to 64 bits. Concretely, the one-byte value <code style=\"font-family:'IBM Plex Mono',monospace;\">0xF8<\u002Fcode> (binary <code style=\"font-family:'IBM Plex Mono',monospace;\">11111000<\u002Fcode>) has a 1 in its top bit, so as an 8-bit signed number it means -8, and this function should return the 64-bit integer -8 (all those new upper bits filled with 1s, not 0s). This operation is called \"sign-extension\".<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">bits == 64<\u002Fcode> (no extension needed); <code style=\"font-family:'IBM Plex Mono',monospace;\">bits == 1<\u002Fcode>; input's upper bits already nonzero above <code style=\"font-family:'IBM Plex Mono',monospace;\">bits<\u002Fcode> (must mask first).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">bits.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">bits.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — bitwise/arithmetic operators only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">sign_extend(0xF8, 8);          // -8\nsign_extend(0x7F, 8);          // 127\nsign_extend(0xFFFFFFFF, 32);   // -1<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 5 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">05<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">bswap<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Byte-Swap an Integer<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">x86 is little-endian; you'll want this if you ever need to sanity-check byte order by hand.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">uint32_t bswap32(uint32_t v); uint64_t bswap64(uint64_t v);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>A 32-bit or 64-bit unsigned integer. No pointers.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>The same value, with its bytes written in the reverse order. Multi-byte numbers can be stored in memory two ways: \"little-endian\" (least-significant byte — the one worth the least, like the ones-digit in a decimal number — stored first/at the lowest address) or \"big-endian\" (most-significant byte first, like how we normally write decimal numbers). x86 uses little-endian; this function converts a value between the two orderings, which is also handy for eyeballing whether a value you're looking at was stored the way you expected.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">0x00000000<\u002Fcode>; <code style=\"font-family:'IBM Plex Mono',monospace;\">0xFFFFFFFF<\u002Fcode>; palindromic patterns like <code style=\"font-family:'IBM Plex Mono',monospace;\">0x00FF00FF<\u002Fcode> that are easy to get subtly wrong.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">bits.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">bits.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — bitwise shift/mask operators only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">bswap32(0x12345678);                    // 0x78563412\nbswap64(0x0011223344556677ULL);         // 0x7766554433221100ULL<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 6 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0 40px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">06<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">leread<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Read Little-Endian Integers From a Buffer<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Every multi-byte ELF and instruction field is read this way — never via a cast through a misaligned pointer.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">uint16_t read_u16le(const uint8_t *p); uint32_t read_u32le(const uint8_t *p); uint64_t read_u64le(const uint8_t *p);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Pointer to the first byte of the field (may be unaligned, caller-owned memory — read-only, nothing is allocated).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>The value those bytes represent, read the way x86 stores multi-byte numbers: least-significant byte first (\"little-endian\" — see #5). So the 2 bytes <code style=\"font-family:'IBM Plex Mono',monospace;\">[0x78, 0x56]<\u002Fcode> in memory represent the number <code style=\"font-family:'IBM Plex Mono',monospace;\">0x5678<\u002Fcode> (the second byte is worth more, so it's shifted left and added to the first) — notice the bytes appear reversed compared to how the resulting number is written.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Pointer not aligned to the type's size (must not crash — no direct pointer-cast dereference); reading right at the end of a buffer (caller's job to bound-check, but document the contract).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">bits.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">bits.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — bitwise shift/mask operators on raw bytes only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">uint8_t buf[4] = {0x78, 0x56, 0x34, 0x12};\nread_u16le(buf);        // 0x5678\nread_u32le(buf);        // 0x12345678<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ============ CHAPTER 2 ============ -->\n  <section id=\"ch2\" style=\"max-width:900px; margin:0 auto; padding:40px 48px 8px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:13px; letter-spacing:0.1em; text-transform:uppercase;\">Chapter 2 / 6<\u002Fdiv>\n    <h2 style=\"font-size:28px; margin:6px 0 4px;\">ELF File Structure<\u002Fh2>\n    <p style=\"color:var(--muted); font-size:14px; margin:0 0 8px;\">Locate and trust the container before touching any instruction bytes. <b>ELF<\u002Fb> (\"Executable and Linkable Format\") is the standard file layout Linux uses for compiled code — executables, shared libraries, and the <code style=\"font-family:'IBM Plex Mono',monospace;\">.o<\u002Fcode> files this curriculum works with are all ELF files, just with different flags set inside them. All structs are the real <code style=\"font-family:'IBM Plex Mono',monospace;\">&lt;elf.h&gt;<\u002Fcode> types (Elf64_Ehdr, Elf64_Shdr, …) — you don't redefine these.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"max-width:900px; margin:0 auto; padding:0 48px;\">\n\n    <!-- EX 7 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">07<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">elfmagic<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Parse the ELF Identification<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Every ELF file starts with the same 16-byte header-before-the-header, called <code style=\"font-family:'IBM Plex Mono',monospace;\">e_ident<\u002Fcode>. It exists so any program reading the file can quickly tell \"is this even an ELF file, and if so, what flavor?\" before parsing anything else.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">typedef struct { int class, data, version, osabi; } ElfIdent;<br>bool parse_ident(const uint8_t *buf, size_t len, ElfIdent *out);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>File buffer, its length; <code style=\"font-family:'IBM Plex Mono',monospace;\">out<\u002Fcode> points at a caller-allocated <code style=\"font-family:'IBM Plex Mono',monospace;\">ElfIdent<\u002Fcode> — a plain stack struct, no heap involved.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">true<\u002Fcode> plus a populated struct if the file's first 4 bytes exactly match a fixed constant sequence — <code style=\"font-family:'IBM Plex Mono',monospace;\">0x7F<\u002Fcode> followed by the three characters <code style=\"font-family:'IBM Plex Mono',monospace;\">'E' 'L' 'F'<\u002Fcode> — which every real ELF file begins with (this fixed identifying sequence is called the file's \"magic bytes\" or \"magic number\"; checking it is the cheapest way to reject a file that isn't what you think it is). <code style=\"font-family:'IBM Plex Mono',monospace;\">false<\u002Fcode> if those 4 bytes don't match. When it returns <code style=\"font-family:'IBM Plex Mono',monospace;\">true<\u002Fcode>, also fill in: which \"class\" the file is (32-bit vs. 64-bit addresses), which byte order it uses (little-endian vs. big-endian, see #5), a version number, and which OS ABI it targets — four more single-byte fields that follow the magic bytes inside <code style=\"font-family:'IBM Plex Mono',monospace;\">e_ident<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">len &lt; 16<\u002Fcode> (must not read out of bounds); wrong magic; the file claims to be a 32-bit ELF (<code style=\"font-family:'IBM Plex Mono',monospace;\">EI_CLASS == ELFCLASS32<\u002Fcode> — this curriculum only handles 64-bit files, so decide whether to reject these or accept-but-warn, and document your choice); the file claims to be big-endian (<code style=\"font-family:'IBM Plex Mono',monospace;\">EI_DATA<\u002Fcode> says so) — rare in practice, since real x86-64 files are always little-endian, but the field is there to check.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">elf.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">elf.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">memcmp<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">ElfIdent id;                        // caller-allocated, on the stack\nbool ok = parse_ident(buf, len, &amp;id);\n// ok == true, id.class == ELFCLASS64, id.data == ELFDATA2LSB<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 8 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">08<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">elfhdr<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Print the ELF Header<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">PROGRAM<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">A minimal readelf -h clone — confirms you can locate and interpret every Elf64_Ehdr field.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">INPUT FORMAT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">argv[1]<\u002Fcode> = path to a file, read whole; first bytes interpreted as <code style=\"font-family:'IBM Plex Mono',monospace;\">Elf64_Ehdr<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EXPECTED INPUT<\u002Fdiv>\n          <div>Any real ELF64 file (any e_type).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EXPECTED OUTPUT<\u002Fdiv>\n          <div>To stdout, one line for each of these fields from the file's main header, printed as \"name: raw-number (meaning)\":<br>• <code style=\"font-family:'IBM Plex Mono',monospace;\">e_type<\u002Fcode> — what kind of ELF file this is (e.g. <code style=\"font-family:'IBM Plex Mono',monospace;\">ET_REL<\u002Fcode> = \"relocatable object\", the unlinked <code style=\"font-family:'IBM Plex Mono',monospace;\">.o<\u002Fcode> output of a compiler; <code style=\"font-family:'IBM Plex Mono',monospace;\">ET_EXEC<\u002Fcode> = a finished executable);<br>• <code style=\"font-family:'IBM Plex Mono',monospace;\">e_machine<\u002Fcode> — which CPU architecture the code inside targets (e.g. <code style=\"font-family:'IBM Plex Mono',monospace;\">EM_X86_64<\u002Fcode>);<br>• <code style=\"font-family:'IBM Plex Mono',monospace;\">e_version<\u002Fcode> — the ELF format version (always 1 in practice);<br>• <code style=\"font-family:'IBM Plex Mono',monospace;\">e_entry<\u002Fcode> — the address the CPU should jump to first when this file runs (0 for a <code style=\"font-family:'IBM Plex Mono',monospace;\">.o<\u002Fcode>, since it isn't runnable on its own yet);<br>• <code style=\"font-family:'IBM Plex Mono',monospace;\">e_shoff<\u002Fcode> — how many bytes into the file the section header table (see #10) begins;<br>• <code style=\"font-family:'IBM Plex Mono',monospace;\">e_shnum<\u002Fcode> — how many entries that table has;<br>• <code style=\"font-family:'IBM Plex Mono',monospace;\">e_shstrndx<\u002Fcode> — which of those entries holds the section-name lookup table (see #11).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>File shorter than <code style=\"font-family:'IBM Plex Mono',monospace;\">sizeof(Elf64_Ehdr)<\u002Fcode>; <code style=\"font-family:'IBM Plex Mono',monospace;\">e_shnum == 0<\u002Fcode>; unknown <code style=\"font-family:'IBM Plex Mono',monospace;\">e_machine<\u002Fcode> value (print the raw number, don't crash).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">elfhdr.c<\u002Fcode> (standalone, builds to <code style=\"font-family:'IBM Plex Mono',monospace;\">./elfhdr<\u002Fcode>).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">open<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">read<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">close<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">write<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">malloc<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">free<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-bash\">$ ./elfhdr prog.o\ne_type:      2 (ET_REL)\ne_machine:   62 (EM_X86_64)\ne_version:   1\ne_entry:     0x0\ne_shoff:     640\ne_shnum:     11\ne_shstrndx:  10<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 9 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">09<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">gatekeeper<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Validate: Relocatable x86-64 Object<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Your disassembler supports one file shape — reject everything else loudly and early.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">int validate_object(const Elf64_Ehdr *hdr, char *err, size_t errlen);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>A parsed ELF header; <code style=\"font-family:'IBM Plex Mono',monospace;\">err<\u002Fcode> is a caller-allocated <code style=\"font-family:'IBM Plex Mono',monospace;\">char<\u002Fcode> buffer (e.g. <code style=\"font-family:'IBM Plex Mono',monospace;\">char err[128]<\u002Fcode>) of size <code style=\"font-family:'IBM Plex Mono',monospace;\">errlen<\u002Fcode> that the function writes a NUL-terminated message into — no allocation.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">0<\u002Fcode> if all three of these hold: the file is a \"relocatable object\" (<code style=\"font-family:'IBM Plex Mono',monospace;\">e_type == ET_REL<\u002Fcode> — the kind of file a compiler produces before a linker combines everything into a runnable program, which is what <code style=\"font-family:'IBM Plex Mono',monospace;\">gcc -c<\u002Fcode> outputs), it targets x86-64 (<code style=\"font-family:'IBM Plex Mono',monospace;\">e_machine == EM_X86_64<\u002Fcode>), and it's a 64-bit file (class is ELFCLASS64). Nonzero otherwise, with a human-readable reason written into <code style=\"font-family:'IBM Plex Mono',monospace;\">err<\u002Fcode> (e.g. \"expected ET_REL, got ET_EXEC\").<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Input is a finished executable or shared library instead of an unlinked object file (<code style=\"font-family:'IBM Plex Mono',monospace;\">ET_EXEC<\u002Fcode>/<code style=\"font-family:'IBM Plex Mono',monospace;\">ET_DYN<\u002Fcode> — typically means whoever built it forgot the <code style=\"font-family:'IBM Plex Mono',monospace;\">-c<\u002Fcode> compiler flag that stops before linking); input targets 32-bit x86 instead of 64-bit (<code style=\"font-family:'IBM Plex Mono',monospace;\">EM_386<\u002Fcode>); a corrupted header that still happens to pass the magic-bytes check from #7.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">elf.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">elf.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — direct struct field comparisons and index-by-index byte assignment only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">char err[128];\nint rc = validate_object(&amp;hdr, err, sizeof(err));\nif (rc != 0) fprintf(stderr, \"invalid object: %s\\n\", err);\n// e.g. err == \"expected ET_REL, got ET_EXEC\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 10 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">10<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">sections<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Parse the Section Header Table<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">An ELF file's contents are split into named chunks called \"sections\" — for example the compiled machine code lives in a section named <code style=\"font-family:'IBM Plex Mono',monospace;\">.text<\u002Fcode>, string data in <code style=\"font-family:'IBM Plex Mono',monospace;\">.rodata<\u002Fcode>, symbol information in <code style=\"font-family:'IBM Plex Mono',monospace;\">.symtab<\u002Fcode>, and so on. The \"section header table\" is a flat array (right after the main header) of fixed-size records, one per section, each recording that section's name, type, and where its bytes live in the file — sections are the map you'll use to find <code style=\"font-family:'IBM Plex Mono',monospace;\">.text<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">.symtab<\u002Fcode>, and <code style=\"font-family:'IBM Plex Mono',monospace;\">.strtab<\u002Fcode>.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">Elf64_Shdr *parse_section_headers(const uint8_t *buf, size_t len, const Elf64_Ehdr *hdr, size_t *out_count);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>File buffer, length, parsed header; <code style=\"font-family:'IBM Plex Mono',monospace;\">out_count<\u002Fcode> points at a caller-allocated <code style=\"font-family:'IBM Plex Mono',monospace;\">size_t<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Returns an array of <code style=\"font-family:'IBM Plex Mono',monospace;\">Elf64_Shdr<\u002Fcode> (one fixed-size record per section, in file order) <b>malloc'd inside the function<\u002Fb> (caller must <code style=\"font-family:'IBM Plex Mono',monospace;\">free()<\u002Fcode> it); <code style=\"font-family:'IBM Plex Mono',monospace;\">*out_count = e_shnum<\u002Fcode>, the number of sections.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">e_shoff + e_shnum*e_shentsize<\u002Fcode> exceeds file length (truncated file); <code style=\"font-family:'IBM Plex Mono',monospace;\">e_shentsize != sizeof(Elf64_Shdr)<\u002Fcode> (don't blindly memcpy the wrong stride); <code style=\"font-family:'IBM Plex Mono',monospace;\">e_shnum == 0<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">elf.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">elf.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">malloc<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">memcpy<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">size_t nsh;\nElf64_Shdr *shdrs = parse_section_headers(buf, len, &amp;hdr, &amp;nsh);\n// shdrs[i] is the i-th section header; nsh == hdr.e_shnum\nfree(shdrs);   // caller's responsibility<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 11 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">11<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">shstrtab<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Resolve Section Names<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">Each section header record stores its name only as a number — a byte offset into a special section (whose own index is given by <code style=\"font-family:'IBM Plex Mono',monospace;\">e_shstrndx<\u002Fcode> from #8) that just holds a long run of NUL-terminated text strings back to back (this kind of blob is called a \"string table\"; the one holding section names specifically is <code style=\"font-family:'IBM Plex Mono',monospace;\">.shstrtab<\u002Fcode>). Storing names this way lets each name be a different length without wasting space on padding. This function turns that offset into the actual name text.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">const char *section_name(const uint8_t *buf, const Elf64_Shdr *shdrs, const Elf64_Ehdr *hdr, int index);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>File buffer, section header array, ELF header (for e_shstrndx), target index.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Pointer <b>directly into <code style=\"font-family:'IBM Plex Mono',monospace;\">buf<\u002Fcode><\u002Fb> at the first character of the name, which continues until a NUL (zero) byte terminates it — nothing is copied or allocated; caller must not free or modify it, and it's only valid as long as <code style=\"font-family:'IBM Plex Mono',monospace;\">buf<\u002Fcode> is.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">e_shstrndx == SHN_UNDEF<\u002Fcode>; <code style=\"font-family:'IBM Plex Mono',monospace;\">sh_name<\u002Fcode> offset past end of .shstrtab; name missing its NUL terminator right at EOF (bound-check before trusting <code style=\"font-family:'IBM Plex Mono',monospace;\">strlen<\u002Fcode>).<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">elf.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">elf.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">strnlen<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">const char *name = section_name(buf, shdrs, &amp;hdr, 3);\nprintf(\"%s\\n\", name);      // \".text\"<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 12 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">12<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">findsec<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Find a Section by Name<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">The lookup you'll call for \".text\", \".symtab\", and \".strtab\".<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">const Elf64_Shdr *find_section(const uint8_t *buf, const Elf64_Shdr *shdrs, size_t count, const Elf64_Ehdr *hdr, const char *name);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Buffer, section array, count, header, target name (e.g. \".text\").<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Pointer <b>into the caller's <code style=\"font-family:'IBM Plex Mono',monospace;\">shdrs<\u002Fcode> array<\u002Fb> (no copy) at the matching entry, or <code style=\"font-family:'IBM Plex Mono',monospace;\">NULL<\u002Fcode> if absent.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>Name appears in more than one section (return first, document it); section legitimately absent (e.g. no .symtab in a stripped object) — <code style=\"font-family:'IBM Plex Mono',monospace;\">NULL<\u002Fcode> is a valid expected result, not an error.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">elf.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">elf.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">strcmp<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">const Elf64_Shdr *text = find_section(buf, shdrs, nsh, &amp;hdr, \".text\");\nif (!text) { fprintf(stderr, \"no .text section\\n\"); return 1; }<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EX 13 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0 40px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">13<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">rawtext<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Extract Raw Section Bytes<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">This gets you the actual machine-code bytes of .text — the input to every decoder in Chapter 5.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">const uint8_t *section_bytes(const uint8_t *buf, size_t buflen, const Elf64_Shdr *shdr, size_t *out_len);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>File buffer, its length, the section's header; <code style=\"font-family:'IBM Plex Mono',monospace;\">out_len<\u002Fcode> points at a caller-allocated <code style=\"font-family:'IBM Plex Mono',monospace;\">size_t<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Pointer <b>into <code style=\"font-family:'IBM Plex Mono',monospace;\">buf<\u002Fcode><\u002Fb> at <code style=\"font-family:'IBM Plex Mono',monospace;\">sh_offset<\u002Fcode> — a read-only view, nothing copied; <code style=\"font-family:'IBM Plex Mono',monospace;\">*out_len = sh_size<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">EDGE CASES<\u002Fdiv>\n          <div>The section named <code style=\"font-family:'IBM Plex Mono',monospace;\">sh_type == SHT_NOBITS<\u002Fcode> (this is how <code style=\"font-family:'IBM Plex Mono',monospace;\">.bss<\u002Fcode> — the section for zero-initialized global variables — is marked: it has a nonzero size because that's how many bytes it'll occupy in memory once the program runs, but no actual bytes are stored in the file itself, since they're all just zero; you must not try to read <code style=\"font-family:'IBM Plex Mono',monospace;\">buf<\u002Fcode> at <code style=\"font-family:'IBM Plex Mono',monospace;\">sh_offset<\u002Fcode> for a section like this); <code style=\"font-family:'IBM Plex Mono',monospace;\">sh_offset + sh_size &gt; buflen<\u002Fcode> (the header claims bytes that don't fit in the file — truncated/corrupt file); <code style=\"font-family:'IBM Plex Mono',monospace;\">sh_size == 0<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">FILES<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace;\">elf.c<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace;\">elf.h<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">ALLOWED FUNCTIONS<\u002Fdiv>\n          <div>None — pointer arithmetic only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:5px;\">EXAMPLE<\u002Fdiv>\n          <pre style=\"margin:0; border-radius:5px; overflow-x:auto;\"><code style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px;\" class=\"hljs language-c\">size_t tlen;\nconst uint8_t *code = section_bytes(buf, len, text, &amp;tlen);\n// code[0..tlen) is exactly the .text section's machine code<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ============ CHAPTER 3 ============ -->\n  <section id=\"ch3\" style=\"max-width:900px; margin:0 auto; padding:40px 48px 8px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:13px; letter-spacing:0.1em; text-transform:uppercase;\">Chapter 3 / 6<\u002Fdiv>\n    <h2 style=\"font-size:28px; margin:6px 0 4px;\">Symbols &amp; Function Ranges<\u002Fh2>\n    <p style=\"color:var(--muted); font-size:14px; margin:0 0 4px;\">Turn raw addresses into function names and boundaries — needed to label output and to know where each function's code stops. A \"symbol\" is a compiler-generated record that names something in the code — a function, a global variable, a section — and says where it lives (its address) and roughly how big it is. They're what let a debugger or disassembler show <code style=\"font-family:'IBM Plex Mono',monospace;\">main<\u002Fcode> instead of a bare address like <code style=\"font-family:'IBM Plex Mono',monospace;\">0x401000<\u002Fcode>.<\u002Fp>\n    <div style=\"background:var(--card); border:1px solid var(--border); border-radius:6px; padding:12px 16px; font-size:13px; color:var(--muted); margin:12px 0 8px; font-family:'IBM Plex Mono',monospace; white-space:pre;\">typedef struct {\n  Elf64_Sym sym;    // the raw symbol table entry\n  const char *name; // resolved via symbol_name(), points into buf\n  uint64_t end;     // exclusive end address, filled in by compute_ranges()\n} Sym;<\u002Fdiv>\n    <p style=\"color:var(--muted); font-size:13px; margin:0 0 8px;\">The caller allocates the <code style=\"font-family:'IBM Plex Mono',monospace;\">Sym<\u002Fcode> array (stack array or a single <code style=\"font-family:'IBM Plex Mono',monospace;\">malloc<\u002Fcode>) — functions below only fill in fields, except #16 which builds the array for you (noted there).<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"max-width:900px; margin:0 auto; padding:0 48px;\">\n\n    <!-- EX 14 -->\n    <div style=\"display:grid; grid-template-columns:64px 1fr; gap:16px; padding:34px 0; border-bottom:1px solid var(--border);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:26px; font-weight:700;\">14<\u002Fdiv>\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:10px;\">\n          <h3 style=\"margin:0; font-size:19px; font-family:'IBM Plex Mono',monospace; font-weight:700; letter-spacing:-0.01em;\">symtab<span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); margin-left:10px;\">Parse the Symbol Table<\u002Fspan><\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;\">FN<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 18px; color:var(--muted); font-size:14px; font-style:italic; line-height:1.6;\">The <code style=\"font-family:'IBM Plex Mono',monospace;\">.symtab<\u002Fcode> section is a flat array of fixed-size <code style=\"font-family:'IBM Plex Mono',monospace;\">Elf64_Sym<\u002Fcode> records — one per symbol — covering every function, global variable, and internal marker the compiler recorded, all in one place.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:160px 1fr; gap:13px 20px; font-size:14px; line-height:1.65;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75); padding-top:2px;\">SIGNATURE<\u002Fdiv>\n          <div><code style=\"font-family:'IBM Plex Mono',monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; display:inline-block;\">Elf64_Sym *parse_symtab(const uint8_t *buf, const Elf64_Shdr *symtab_shdr, size_t *out_count);<\u002Fcode><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">INPUT<\u002Fdiv>\n          <div>Buffer, the \".symtab\" section header; <code style=\"font-family:'IBM Plex Mono',monospace;\">out_count<\u002Fcode> points at a caller-allocated <code style=\"font-family:'IBM Plex Mono',monospace;\">size_t<\u002Fcode>.<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:0.02em; color:oklch(0.4 0.02 75);\">OUTPUT<\u002Fdiv>\n          <div>Array of <code style=\"font-family:'IB
